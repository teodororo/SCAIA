# CI deste repositório (a action SCAIA).
# Roda em todo pull request: garante que o código compila e que o bundle builda.
# O dist/ NÃO precisa ser commitado pelo autor do PR — o workflow de release
# rebuilda e commita o dist/ automaticamente ao mergear na main.
name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build bundle
        run: npm run build
