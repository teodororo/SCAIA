# Workflow de exemplo para quem consome a action. Copie isto para um repositório
# que deseja receber revisões por IA.
name: Manual Workflow
on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: ./
      - uses: teodororo/SCAIA@v1
        with:
          api-token: ${{ secrets.OPENAI_API_KEY }}
          model: o4-mini
