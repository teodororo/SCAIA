# Workflow de exemplo para quem consome a action. Copie isto para um repositório
# que deseja receber revisões por IA.
name: Revisão de Código por IA
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: teodororo/SCAIA@v1
        with:
          api-token: ${{ secrets.AI_API_TOKEN }}
          model: gpt-4o
