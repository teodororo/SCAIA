name: "SCAIA - Revisão de Código por IA"
description: "Roda uma revisão de código por IA nos diffs do pull request usando qualquer endpoint compatível com a OpenAI, postando comentários inline."
author: "scaia"
branding:
  icon: "git-pull-request"
  color: "purple"

inputs:
  api-token:
    description: "Token de API do provedor de IA (a chave do próprio chamador)."
    required: true
  api-base-url:
    description: "URL base de um endpoint Chat Completions compatível com a OpenAI."
    required: false
    default: "https://api.openai.com/v1"
  model:
    description: "Id do modelo a usar na revisão (ex.: gpt-4o, claude-3-5-sonnet via proxy)."
    required: true
  github-token:
    description: "Token usado para ler o PR e postar comentários da revisão. Padrão: token do workflow."
    required: false
    default: ${{ github.token }}
  mode:
    description: "'pr' para revisar apenas o diff do pull request; 'full' para escanear o repositório inteiro (exige actions/checkout)."
    required: false
    default: "pr"
  system-prompt:
    description: "Override opcional do prompt de sistema do revisor."
    required: false
    default: ""
  temperature:
    description: "Temperatura de amostragem (0-2). Vazio = usa o default do modelo. Deixe vazio para modelos que só aceitam o default (ex.: série gpt-5)."
    required: false
    default: ""
  max-files:
    description: "Número máximo de arquivos a enviar para a IA."
    required: false
    default: "500"
  include:
    description: "Padrões glob (separados por vírgula ou quebra de linha) de arquivos a incluir no modo 'full'. Vazio = todos os arquivos versionados."
    required: false
    default: ""
  exclude:
    description: "Padrões glob (separados por vírgula ou quebra de linha) de arquivos a ignorar."
    required: false
    default: ""
  max-file-bytes:
    description: "No modo 'full', ignora arquivos maiores que este tamanho em bytes."
    required: false
    default: "100000"
  max-chars-per-request:
    description: "No modo 'full', orçamento de caracteres por requisição à IA (os arquivos são enviados em lotes)."
    required: false
    default: "100000"
  report-path:
    description: "No modo 'full', caminho do arquivo Markdown de relatório a ser gerado."
    required: false
    default: "scaia-report.md"
  fail-on-findings:
    description: "Se 'true', a action sai com status diferente de zero quando há achados."
    required: false
    default: "false"
  max-retries:
    description: "Número máximo de re-tentativas em respostas 429 (rate limit) ou 5xx da IA."
    required: false
    default: "5"

outputs:
  findings-count:
    description: "Número de achados produzidos pela revisão da IA."
  report-path:
    description: "No modo 'full', caminho do arquivo de relatório Markdown gerado."

runs:
  using: "node20"
  main: "dist/index.js"
